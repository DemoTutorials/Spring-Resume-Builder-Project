spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=300000
server.port=${UTILITY_PORT}
spring.application.name=UTILITY
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?currentSchema=crm_kwa
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
eureka.client.serviceUrl.defaultZone=http://${EUREKA_HOST}:${EUREKA_PORT}/eureka
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.xml
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
eureka.server.enableSelfPreservation=false
spring.sleuth.sampler.probability=1.0
server.port=6054
logging.level.org.springframework.jdbc.core = DEBUG
spring.jackson.mapper.DEFAULT_VIEW_INCLUSION=true
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.path=/spring
emailTemplateTemporary=33
emailTemplate=34
updateUserEmailTemplate=65
